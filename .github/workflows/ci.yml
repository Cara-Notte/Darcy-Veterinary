name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Normalize Gradle wrapper line endings
        run: python -c "from pathlib import Path; p = Path('gradlew'); p.write_bytes(p.read_bytes().replace(b'\\r\\n', b'\\n'))"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon clean test --stacktrace
